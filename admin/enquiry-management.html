<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry Management - Solar CRM Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar-fixed.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="admin-dashboard.html">
                <i class="fas fa-solar-panel me-2"></i>
                Solar CRM Portal
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="admin-dashboard.html">
                            <i class="fas fa-tachometer-alt me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="enquiry-management.html">
                            <i class="fas fa-clipboard-list me-1"></i>Enquiries
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="project-management.html">
                            <i class="fas fa-tools me-1"></i>Projects
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="logout()">
                            <i class="fas fa-sign-out-alt me-1"></i>Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="bg-primary text-white py-4">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h1 class="display-6 fw-bold mb-0">
                        <i class="fas fa-clipboard-list me-3"></i>
                        Enquiry Management
                    </h1>
                    <p class="lead mb-0">Track and manage solar enquiries</p>
                </div>
                <div class="col-md-4 text-end">
                    <button class="btn btn-light" data-bs-toggle="modal" data-bs-target="#addEnquiryModal">
                        <i class="fas fa-plus me-2"></i>Add Enquiry
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container my-5">
        <!-- Filters Row -->
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <label for="statusFilter" class="form-label">Filter by Status</label>
                <select class="form-select" id="statusFilter" onchange="filterEnquiries()">
                    <option value="">All Status</option>
                    <option value="NEW">NEW</option>
                    <option value="CONTACTED">CONTACTED</option>
                    <option value="FOLLOW-UP">FOLLOW-UP</option>
                    <option value="CONVERTED">CONVERTED</option>
                    <option value="REJECTED">REJECTED</option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="dateFilter" class="form-label">Filter by Date</label>
                <input type="date" class="form-control" id="dateFilter" onchange="filterEnquiries()">
            </div>
            <div class="col-md-3">
                <label for="searchFilter" class="form-label">Search</label>
                <input type="text" class="form-control" id="searchFilter" placeholder="Search by name or email..." onkeyup="filterEnquiries()">
            </div>
            <div class="col-md-3">
                <label class="form-label">Actions</label>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-secondary" onclick="resetFilters()">
                        <i class="fas fa-refresh me-1"></i>Reset
                    </button>
                    <button class="btn btn-outline-primary" onclick="exportEnquiries()">
                        <i class="fas fa-download me-1"></i>Export
                    </button>
                </div>
            </div>
        </div>

        <!-- Enquiries Table -->
        <div class="card shadow-sm">
            <div class="card-header bg-light">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <h5 class="card-title mb-0">
                            <i class="fas fa-list me-2"></i>
                            Enquiries List
                        </h5>
                    </div>
                    <div class="col-md-6 text-end">
                        <span class="badge bg-primary fs-6" id="totalCount">0 Enquiries</span>
                    </div>
                </div>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Enquiry ID</th>
                                <th>Customer</th>
                                <th>Contact</th>
                                <th>Location</th>
                                <th>System</th>
                                <th>Bill (₹)</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="enquiriesTable">
                            <tr>
                                <td colspan="9" class="text-center py-4">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="card-footer bg-light">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <small class="text-muted">Showing <span id="showingCount">0</span> of <span id="totalEnquiries">0</span> enquiries</small>
                    </div>
                    <div class="col-md-6">
                        <nav aria-label="Enquiries pagination">
                            <ul class="pagination pagination-sm justify-content-end mb-0" id="pagination">
                                <!-- Pagination will be generated here -->
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Enquiry Modal -->
    <div class="modal fade" id="addEnquiryModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-plus me-2"></i>
                        Add New Enquiry
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addEnquiryForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="addFullName" class="form-label">Full Name *</label>
                                <input type="text" class="form-control" id="addFullName" required>
                            </div>
                            <div class="col-md-6">
                                <label for="addEmail" class="form-label">Email *</label>
                                <input type="email" class="form-control" id="addEmail" required>
                            </div>
                            <div class="col-md-6">
                                <label for="addWhatsApp" class="form-label">WhatsApp Number *</label>
                                <input type="tel" class="form-control" id="addWhatsApp" required>
                            </div>
                            <div class="col-md-6">
                                <label for="addMonthlyBill" class="form-label">Monthly Bill (₹) *</label>
                                <input type="number" class="form-control" id="addMonthlyBill" required>
                            </div>
                            <div class="col-md-6">
                                <label for="addCity" class="form-label">City *</label>
                                <input type="text" class="form-control" id="addCity" required>
                            </div>
                            <div class="col-md-6">
                                <label for="addPincode" class="form-label">Pincode *</label>
                                <input type="text" class="form-control" id="addPincode" required>
                            </div>
                            <div class="col-md-6">
                                <label for="addRoofArea" class="form-label">Roof Area (sq ft) *</label>
                                <input type="number" class="form-control" id="addRoofArea" required>
                            </div>
                            <div class="col-md-6">
                                <label for="addSystemType" class="form-label">System Type *</label>
                                <select class="form-select" id="addSystemType" required>
                                    <option value="">Select System Type</option>
                                    <option value="grid-tied">Grid-Tied</option>
                                    <option value="off-grid">Off-Grid</option>
                                    <option value="hybrid">Hybrid</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="addPlanningAfter" class="form-label">Planning Timeline</label>
                                <select class="form-select" id="addPlanningAfter">
                                    <option value="0">Immediately</option>
                                    <option value="12">1 Year</option>
                                    <option value="24">2 Years</option>
                                    <option value="36">3 Years</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="addAssignedTo" class="form-label">Assigned To</label>
                                <select class="form-select" id="addAssignedTo">
                                    <option value="">Select Operator</option>
                                    <option value="OP001">Rajesh Kumar</option>
                                    <option value="OP002">Priya Sharma</option>
                                    <option value="OP003">Amit Patel</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label for="addMessage" class="form-label">Message</label>
                                <textarea class="form-control" id="addMessage" rows="3"></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="addNewEnquiry()">Add Enquiry</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Enquiry Details Modal -->
    <div class="modal fade" id="enquiryDetailsModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-info-circle me-2"></i>
                        Enquiry Details
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="enquiryDetailsContent">
                    <!-- Enquiry details will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/crm-functions.js"></script>
    <script src="js/enquiry-management.js"></script>
<script src="js/sidebar-fixed.js"></script>
</body>
</html>
